name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  BUN_VERSION: '1.3.11'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
