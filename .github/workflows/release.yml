name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag commit is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not on origin/main."
            exit 1
          fi

      - name: Ensure tag matches package.json version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(cat package.json | grep '"version"' | head -1 | awk -F'"' '{print $4}')"
          if [ "${TAG_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

  build-x64:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build x64 binary
        run: bun run build:x64

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gandr-linux-x64
          path: dist/gandr-linux-x64

  build-arm64:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build arm64 binary
        run: bun run build:arm64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gandr-linux-arm64
          path: dist/gandr-linux-arm64

  release:
    runs-on: ubuntu-latest
    needs: [build-x64, build-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gandr-linux-x64
          path: dist/

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gandr-linux-arm64
          path: dist/

      - name: Mark binaries executable
        run: chmod +x dist/gandr-linux-x64 dist/gandr-linux-arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum gandr-linux-x64 gandr-linux-arm64 > gandr-checksums.txt

      - name: Render pinned installer
        run: |
          sed "s|__GANDR_RELEASE_REF__|${GITHUB_REF_NAME}|g" install.sh > dist/install.sh
          chmod +x dist/install.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/gandr-linux-x64
            dist/gandr-linux-arm64
            dist/gandr-checksums.txt
            dist/install.sh
